name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 1. Завантажуємо стару історію
      - name: Load Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      # Копіювання історії
      - name: Copy history to results
        if: always()
        continue-on-error: true
        run: |
          mkdir -p allure-results/history
          [ -d "gh-pages-dir/history" ] && cp -r gh-pages-dir/history/* allure-results/history/ || echo "No history found"

      # 2. ЗАПУСК ТЕСТІВ
      - name: Run Playwright tests
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        run: npx playwright test
        continue-on-error: true

      # 3. ГЕНЕРАЦІЯ ЗВІТУ
      #- name: Generate Allure Report
      #  if: always()
      # run: |
      #    echo "Checking for attachments..."
      #    ls allure-results | grep -E "\.(png|webm|mp4|json)$" || echo "No attachments found!"
      #    npx allure generate allure-results --clean -o allure-report
      - name: Generate Allure Report
        if: always()
        run: |
          npx allure generate allure-results --clean -o allure-report
          
          # 🔥 МАГИЯ ТУТ: Создаем папку для трейсов внутри отчета
          mkdir -p allure-report/traces
          # Копируем все zip-файлы из папки результатов тестов в отчет
          # Мы используем '|| true', чтобы пайплайн не упал, если трейсов нет
          cp test-results/**/*.zip allure-report/traces/ || true

      # 4. ДЕПЛОЙ ЗВІТУ
      #- name: Deploy Allure Report to GitHub Pages
      #  if: always()
      #  uses: peaceiris/actions-gh-pages@v3
      # with:
      #    github_token: ${{ secrets.GITHUB_TOKEN }}
      #    publish_dir: ./allure-report
      #    publish_branch: gh-pages
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages

      # 5. ЗБЕРІГАЄМО АРТЕФАКТИ
      - name: Upload Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
