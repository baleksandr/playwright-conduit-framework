name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # 1. Завантажуємо історію (щоб графік Trends працював)
    - name: Load Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-dir

    - name: Copy history to results
      if: always()
      continue-on-error: true
      run: |
        mkdir -p allure-results/history
        cp -R gh-pages-dir/history/* allure-results/history/ || true

    # 2. ЗАПУСК ТЕСТІВ (Чесний запуск: впаде — буде ЧЕРВОНИМ)
    - name: Run Playwright tests
      env:
        USER_EMAIL: ${{ secrets.USER_EMAIL }}
        USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      run: npx playwright test

    # 3. ГЕНЕРАЦІЯ ЗВІТУ (if: always() змушує працювати навіть після падіння тесту)
    - name: Generate Allure Report
      if: always() 
      run: npx allure generate allure-results --output allure-report --clean

    # 4. ДЕПЛОЙ ЗВІТУ (теж завжди)
    - name: Deploy Allure Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages

    # 5. СТАНДАРТНІ АРТЕФАКТИ
    - name: Upload Playwright Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
